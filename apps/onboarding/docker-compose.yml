services:
  onboarding-backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      TRUSTED_AGENTS_HOST: 0.0.0.0
      TRUSTED_AGENTS_PORT: 8088
      TRUSTED_AGENTS_DB: /data/onboarding.sqlite3
      # Set in a local env file or Docker secret. Never commit the real value.
      TRUSTED_AGENTS_MASTER_KEY: ${TRUSTED_AGENTS_MASTER_KEY:?set TRUSTED_AGENTS_MASTER_KEY}
    volumes:
      - onboarding-data:/data
    ports:
      - "127.0.0.1:8088:8088"

volumes:
  onboarding-data:
